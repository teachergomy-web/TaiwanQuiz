<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶島全攻略</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 童趣可愛的字體與基礎設定 */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
            color: #334155;
            user-select: none;
        }

        /* 立體按鈕樣式 */
        .btn-cute {
            transition: all 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }
        .btn-cute:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        .btn-option {
            box-shadow: 0 4px 0 #cbd5e1;
        }
        .btn-option:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cbd5e1;
        }

        /* 卡片彈出動畫 */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 隱藏元素用的class */
        .hidden-screen {
            display: none !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6">

    <!-- 主容器 -->
    <div class="max-w-3xl md:max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white relative flex flex-col h-[95vh] md:h-[90vh]">
        
        <!-- 頂部資訊列 (遊戲中顯示) -->
        <div id="header-bar" class="bg-yellow-300 p-4 md:p-6 flex justify-between items-center rounded-t-2xl hidden-screen">
            <div id="week-title" class="font-black text-yellow-900 text-lg md:text-2xl truncate max-w-[200px] md:max-w-[400px]">
                第一周
            </div>
            <button onclick="backToMenu()" class="text-yellow-800 font-bold bg-yellow-400 hover:bg-yellow-500 px-4 py-2 md:px-6 md:py-3 md:text-xl rounded-full text-sm">
                回主選單
            </button>
        </div>

        <!-- ================= 畫面 1: 首頁 ================= -->
        <div id="screen-home" class="p-8 md:p-16 text-center flex flex-col items-center justify-center flex-1">
            <div class="text-6xl md:text-8xl mb-4 md:mb-8 animate-bounce">💡</div>
            <h1 class="text-4xl md:text-6xl font-black text-green-600 mb-4 drop-shadow-md">寶島全攻略</h1>
            <p class="text-gray-500 mb-8 md:mb-12 font-bold md:text-2xl">玩遊戲，認識我們可愛的家鄉！</p>
            
            <button onclick="showScreen('screen-select')" class="btn-cute bg-orange-400 text-white text-2xl md:text-4xl font-black py-4 px-10 md:py-6 md:px-16 rounded-full w-full max-w-md">
                開始探險 🚀
            </button>
        </div>

        <!-- ================= 畫面 2: 選擇周次 ================= -->
        <div id="screen-select" class="p-6 md:p-12 hidden-screen flex flex-1 flex-col">
            <h2 class="text-2xl md:text-4xl font-black text-center text-blue-600 mb-6 md:mb-10">請選擇挑戰主題 🎯</h2>
            <div id="category-list" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-4 pb-4">
                <!-- 由 JS 動態產生選項 -->
            </div>
        </div>

        <!-- ================= 畫面 3: 遊戲問答 ================= -->
        <div id="screen-game" class="p-4 md:p-8 hidden-screen flex flex-1 flex-col relative overflow-y-auto">
            <div class="mb-2 md:mb-6 text-center">
                <span class="inline-block bg-blue-100 text-blue-800 px-4 py-1 md:px-6 md:py-2 rounded-full text-sm md:text-xl font-bold mb-2 md:mb-3">
                    第 <span id="question-counter">1</span> / <span id="total-questions">?</span> 題
                </span>
                <h3 id="question-text" class="text-lg md:text-2xl font-bold text-gray-800 min-h-[60px] md:min-h-[80px] flex items-center justify-center">
    題目載入中...
</h3>

<div id="image-container" class="hidden mb-4 flex justify-center">
    <img id="question-image" src="" class="max-h-48 md:max-h-64 rounded-xl shadow-md border-4 border-white">
</div>

            <!-- 選項區 -->
            <div id="options-container" class="space-y-3 md:space-y-4 flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full pb-4">
            </div>

            <!-- 解答與解析覆蓋層 (預設隱藏) -->
            <div id="result-overlay" class="absolute inset-0 bg-white/95 z-10 hidden-screen flex flex-col items-center justify-center p-6 animate-pop overflow-y-auto w-full text-center">
                <div id="result-icon" class="text-5xl md:text-7xl mb-2 md:mb-4 mt-auto mx-auto w-full text-center">⭕</div>
                <h2 id="result-title" class="text-3xl md:text-5xl font-black mb-2 md:mb-4 text-green-500 w-full text-center">答對了！</h2>
                <div class="bg-gray-50 border-2 border-gray-200 rounded-xl p-4 md:p-6 w-full max-w-2xl flex flex-col items-center justify-center text-center mb-4 md:mb-8 mx-auto">
                    <p class="font-bold text-gray-500 text-sm md:text-xl mb-2 w-full text-center">💡 知識補給站</p>
                    <p id="explanation-text" class="text-gray-700 md:text-xl w-full text-center">這裡是解析內容...</p>
                </div>

                <!-- 答錯時顯示下一題按鈕 -->
                <button id="btn-next-wrong" onclick="nextQuestion()" class="btn-cute bg-gray-400 text-white font-bold py-3 px-8 md:py-4 md:px-16 md:text-2xl rounded-full w-full max-w-md hidden-screen mb-auto mx-auto">
                    下一題 ⏭️
                </button>

                <!-- 答對時顯示機會命運按鈕 -->
                <div id="chance-fate-container" class="w-full max-w-2xl flex space-x-4 md:space-x-8 hidden-screen mb-auto mx-auto">
                    <button onclick="drawCard('機會')" class="btn-cute flex-1 bg-purple-500 text-white font-black text-xl md:text-3xl py-3 md:py-6 rounded-2xl border-b-4 border-purple-700">
                        🌟 機會
                    </button>
                    <button onclick="drawCard('命運')" class="btn-cute flex-1 bg-indigo-500 text-white font-black text-xl md:text-3xl py-3 md:py-6 rounded-2xl border-b-4 border-indigo-700">
                        ❓ 命運
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= 畫面 4: 卡片結果 ================= -->
        <div id="screen-card-result" class="absolute inset-0 bg-yellow-100 z-20 hidden-screen flex flex-col items-center justify-center p-6 md:p-12 animate-pop overflow-y-auto w-full text-center">
            <div class="my-auto w-full flex flex-col items-center justify-center mx-auto">
                <h2 id="card-type-title" class="text-2xl md:text-4xl font-black text-yellow-800 mb-6 md:mb-10 bg-yellow-300 px-8 py-3 rounded-full">
                    機會卡
                </h2>
                <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-2xl text-center border-4 border-yellow-300 relative">
                    <div class="absolute -top-8 left-1/2 transform -translate-x-1/2 text-6xl md:text-7xl">💌</div>
                    <p id="card-desc" class="text-xl md:text-3xl font-bold text-gray-700 mt-4 md:mt-6">
                        在夜市撿到100元！
                    </p>
                    <div id="card-score" class="text-3xl md:text-5xl font-black mt-4 md:mt-6 text-green-500">
                        +10 分
                    </div>
                </div>
                <button onclick="nextQuestion()" class="btn-cute mt-8 md:mt-10 bg-blue-500 text-white font-bold py-3 px-10 md:py-4 md:px-16 rounded-full text-xl md:text-2xl w-full max-w-md">
                    下一題 ⏭️
                </button>
            </div>
        </div>

        <!-- ================= 畫面 5: 結算畫面 ================= -->
        <div id="screen-end" class="p-8 md:p-16 text-center flex flex-col items-center justify-center flex-1 hidden-screen">
            <div class="text-6xl md:text-8xl mb-4 md:mb-8">🎉</div>
            <h2 class="text-3xl md:text-6xl font-black text-gray-800 mb-4 md:mb-8">本週挑戰完成！</h2>
            <p class="text-gray-500 mb-8 md:mb-12 font-bold text-xl md:text-3xl">你真是個台灣小達人！</p>
            
            <button onclick="backToMenu()" class="btn-cute bg-green-500 text-white text-xl md:text-3xl font-black py-4 px-10 md:py-6 md:px-16 rounded-full w-full max-w-md">
                挑戰其他主題 🔄
            </button>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. 遊戲資料設定區 (可在此擴充題目與卡片)
        // ==========================================
        
        // 8大分類設定
        const weeks = [
            { id: 0, title: "食：台灣的肚子(1)", icon: "🍱", color: "bg-orange-100 border-orange-300 text-orange-800" },
            { id: 1, title: "食：台灣的肚子(2)", icon: "🧋", color: "bg-amber-100 border-amber-300 text-amber-800" },
            { id: 2, title: "衣：台灣人的穿搭", icon: "👕", color: "bg-pink-100 border-pink-300 text-pink-800" },
            { id: 3, title: "住：台灣的家", icon: "🏠", color: "bg-teal-100 border-teal-300 text-teal-800" },
            { id: 4, title: "行：台灣人的移動", icon: "🚌", color: "bg-blue-100 border-blue-300 text-blue-800" },
            { id: 5, title: "育：台灣人的學習", icon: "🎒", color: "bg-indigo-100 border-indigo-300 text-indigo-800" },
            { id: 6, title: "樂：台灣人的休閒(1)", icon: "🏕️", color: "bg-green-100 border-green-300 text-green-800" },
            { id: 7, title: "樂：台灣人的休閒(2)", icon: "🎤", color: "bg-lime-100 border-lime-300 text-lime-800" }
        ];

        // 題目資料庫 
        const allQuestions = {
// 第一週：水果與植物祕密篇 (共105題)
            0: [
                { question: "草莓身上一點一點的小黑點是什麼？", options: ["種子", "真正的果實", "毛孔"], correctIndex: 1, explanation: "那才是真正的果實，紅色的部分是花托。" },
                { question: "為什麼香蕉通常被裝在「藍色」的塑膠袋裡？", options: ["為了美觀", "藍色能防蟲和防曬", "讓香蕉變藍色"], correctIndex: 1, explanation: "是一種為了農業保護的「PE套袋」，藍色有助於遮光、防曬、抗寒、防蟲害，並提供穩定的溫濕度，有利於香蕉生長。" },
                { question: "全世界只有哪裡才產「愛玉」？", options: ["台灣", "日本", "美國"], correctIndex: 0, explanation: "因為只有台灣有「愛玉小蜂」能幫它授粉。" },
                { question: "鳳梨的「頭」（有葉子的部分）其實是它的哪個部位？", options: ["嘴巴", "屁股", "手臂"], correctIndex: 1, explanation: "養分從下往上傳，所以底部通常比較甜。" },
                { question: "鳳梨為什麼會「咬舌頭」？", options: ["因為它有牙齒", "因為有鳳梨酵素", "因為它沒洗乾淨"], correctIndex: 1, explanation: "鳳梨會「咬舌頭」主要是因為其含有強力的「鳳梨酵素」（鳳梨蛋白酶）。這種酵素能分解蛋白質，接觸到由蛋白質組成的口腔黏膜和舌頭時，會引起細胞刺激與微小損傷，產生刺痛麻木感。" },
                { question: "「釋迦」的名字是因為它長得像誰的頭？", options: ["外星人", "釋迦牟尼佛", "菜花"], correctIndex: 1, explanation: "因為外觀長得像釋迦牟尼佛的頭部而得名。" },
                { question: "芭樂的別名「那拔」是從哪種語言音譯過來的？", options: ["日語", "英語", "西班牙語"], correctIndex: 1, explanation: "來自英文 Guava 的音譯。" },
                { question: "火龍果其實是哪種植物的果實？", options: ["玫瑰花", "仙人掌", "椰子樹"], correctIndex: 1, explanation: "紅色火龍果其實是仙人掌科三角柱或蛇鞭柱屬的熱帶植物果實，並非長在樹上。" },
                { question: "哪種水果吃完後，排泄物可能會變紅色？", options: ["紅肉火龍果", "西瓜", "番茄"], correctIndex: 0, explanation: "紅肉火龍果含有大量的天然色素「甜菜紅素」，人體無法完全吸收與分解，色素會隨大小便排出體外，屬正常現象。" },
                { question: "為什麼木瓜牛奶放久了會變苦？", options: ["木瓜壞掉了", "酵素分解了蛋白質", "糖加太少"], correctIndex: 1, explanation: "木瓜中的「木瓜蛋白酶」會分解牛奶中的蛋白質（酪蛋白），將其分解成小分子的「胜肽」，而這些胜肽帶有明顯的苦味。" },
                { question: "哪種水果切開來後，形狀看起來像一顆星星？", options: ["蓮霧", "楊桃", "芒果"], correctIndex: 1, explanation: "楊桃橫切面的形狀就像星星一樣，所以英文也叫 Starfruit。" },
                { question: "「美人腿」是指哪一種蔬菜？", options: ["茭白筍", "大白菜", "茄子"], correctIndex: 0, explanation: "因其外殼剝開後，筍肉白皙、細長且筆直，形狀恰如女性的小腿，故在臺灣被暱稱為「美人腿」。" },
                { question: "蓮霧最早是由誰引進台灣的？", options: ["鄭成功", "荷蘭人", "日本人"], correctIndex: 1, explanation: "蓮霧最早是由荷蘭人在17世紀（約300多年前）從東南亞引進台灣進行栽種的。" },
                { question: "西瓜的性別怎麼看？通常哪種比較甜？", options: ["公的", "母的", "都一樣"], correctIndex: 1, explanation: "母的（底部圈圈較大、果蒂較捲）通常比較甜。" },
                { question: "「破布子」通常用來煮哪種料理？", options: ["蒸魚", "炸雞", "煮珍奶"], correctIndex: 0, explanation: "製作的破布子多用來蒸魚、炒肉末，也可以用來炒、煲湯、調製醬汁等。" },
                { question: "「芒果的故鄉」通常是指台灣哪個地方？", options: ["玉井", "大湖", "燕巢"], correctIndex: 0, explanation: "玉井以種植愛文芒果聞名，是全台愛文芒果最早種植成功且產量豐富的地區。" },
                { question: "台灣最常見的「愛文芒果」是從哪國引進的？", options: ["美國", "泰國", "菲律賓"], correctIndex: 0, explanation: "台灣最常見的「愛文芒果」（Irwin）是於 1954 年從美國佛羅里達州引進的。" },
                { question: "苦瓜為什麼是苦的？", options: ["為了不讓人吃", "含有苦瓜素", "它沒熟"], correctIndex: 1, explanation: "苦瓜含有苦瓜苷以及葫蘆素。強烈的苦味可以作為「天然殺蟲劑」，讓昆蟲不敢隨意啃食。" },
                { question: "冬瓜雖然名字有個「冬」字，但它其實是哪一個季節盛產的蔬菜呢？", options: ["春天", "夏天", "冬天", "只有過年才有"], correctIndex: 1, explanation: "夏天：它是道地的夏季蔬菜，因為很耐放，可以從夏天一直放到冬天吃。" },
                { question: "在沒有冷氣的古代，人們夏天睡覺太熱時會怎麼利用大冬瓜？", options: ["把冬瓜切片貼在額頭上", "抱著大冬瓜睡覺消暑", "把冬瓜當成枕頭墊高", "坐在冬瓜上面乘涼"], correctIndex: 1, explanation: "抱著大冬瓜睡覺：冬瓜含水量高，觸感比室溫低，是古代的「天然冷氣」。" },
                { question: "我們常吃的「鳳梨酥」，為了讓內餡軟Q順口，通常會加入哪種蔬菜做的醬？", options: ["小黃瓜", "南瓜", "冬瓜", "苦瓜"], correctIndex: 2, explanation: "冬瓜：冬瓜醬纖維細、味道甜，是傳統鳳梨酥內餡的好搭檔。" },
                { question: "冬瓜茶真的是用冬瓜做的嗎？", options: ["是", "不是，是化工原料", "是用西瓜皮做的"], correctIndex: 0, explanation: "是的，正宗的冬瓜茶是將新鮮大冬瓜加糖熬煮出冬瓜糖磚，再加水煮成的。" },
                { question: "「九層塔」的名字由來是因為？", options: ["它有九層樓高", "花序重疊很多層", "要洗九次"], correctIndex: 1, explanation: "因其開花時，花序重重疊疊，外觀如同寶塔狀，且層數繁多而得名。" },
                { question: "哪種蔬菜長在水裡，且中秋節前後最盛產？", options: ["茭白筍", "高麗菜", "地瓜", "花椰菜"], correctIndex: 0, explanation: "茭白筍是水生植物，中秋節前後正好是它的盛產期。" },
                { question: "奇異果（Kiwi）現在很有名，但它的老家其實是在哪裡？", options: ["紐西蘭", "中國（原名奇異莓或獼猴桃）", "澳洲", "印度"], correctIndex: 1, explanation: "中國：奇異果原產於中國，後來傳到紐西蘭才被發揚光大。" },
                { question: "把蘋果丟進水桶裡，它會發生什麼事？", options: ["沉到水底", "浮在水面上", "像潛水艇一樣停在中間", "飄在空中"], correctIndex: 1, explanation: "浮在水面：因為蘋果有 25% 是空氣，就像自帶救生圈。" },
                { question: "柚子皮除了當帽子，還可以用來做什麼？", options: ["燃料", "天然防蚊香", "籃球", "橡皮擦"], correctIndex: 1, explanation: "將吃剩的柚子皮徹底曬乾，點燃後會產生不刺鼻的清香，能有效驅趕蚊蟲。" },
                { question: "葡萄表皮有一層白白的粉（果粉），那是什麼？", options: ["農藥殘留", "沒洗乾淨的灰塵", "葡萄分泌的天然蠟質，用來保護水分"], correctIndex: 2, explanation: "天然蠟質：葡萄表皮的白色粉末是天然的果粉，非農藥殘留，而是葡萄自身分泌的蠟質成分。" },
                { question: "為什麼以前的船員出海都要帶很多檸檬？", options: ["為了預防壞血病（補充維他命C）", "為了把船洗乾淨", "為了讓魚肉更好吃", "為了養顏美容"], correctIndex: 0, explanation: "預防壞血病：檸檬有豐富的維他命 C，是古代船員的救命仙丹。" },
                { question: "為什麼水蜜桃的皮膚摸起來「毛茸茸」的，長滿了細細的毛？", options: ["怕冷，所以穿上毛衣保暖", "為了保護自己，防止雨水直接淋濕皮膚或被昆蟲咬", "為了讓人類摸起來覺得很舒服", "那些毛其實是它的頭髮"], correctIndex: 1, explanation: "為了保護自己：這些細毛像是水蜜桃的「天然雨衣」，可以讓水滴滑落，不會讓果實因為太潮濕而爛掉。" },
                { question: "水蜜桃和哪一種「堅果」其實是親戚，連裡面的硬殼種子都長得很像？", options: ["花生", "核桃", "杏仁（扁桃仁）", "腰果"], correctIndex: 2, explanation: "杏仁（扁桃仁）：水蜜桃和杏仁在植物學上是親戚，裡面的硬核敲開，種子長得跟杏仁非常像。" },
                { question: "榴槤雖然長在樹上，但它成熟時會發生什麼事？", options: ["會慢慢變透明", "會自己從高高的樹上掉下來", "會像氣球一樣飛上天", "會縮小變成小硬球"], correctIndex: 1, explanation: "自己從樹上掉下來：榴槤成熟時會自動脫落。果農進入榴槤園通常要戴安全帽以免被砸到。" },
                { question: "為什麼很多飯店、飛機或捷運都規定禁止帶榴槤？", options: ["因為它的刺會刺破椅子", "因為它太重了會讓飛機飛不動", "因為它的味道太濃郁，很多人受不了", "因為它會招來猴子"], correctIndex: 2, explanation: "味道太濃郁：榴槤的味道滲透力超強，在密閉空間散發味道會留很久，所以公共場所禁止攜帶。" },
                { question: "在森林裡，榴槤強烈的「香味」其實是為了吸引哪些大力士動物來幫它播種？", options: ["蝴蝶和蜜蜂", "紅毛猩猩和大象", "飛鳥和小魚", "穿山甲和松鼠"], correctIndex: 1, explanation: "紅毛猩猩和大象很愛榴槤的味道，吃掉果肉後會帶著種子走到遠方排泄，幫榴槤播種。" },
                { question: "榴槤被稱為「水果之王」，那你知道誰被稱為「水果之后」，常被說跟榴槤是絕配嗎？", options: ["西瓜", "香蕉", "山竹", "蘋果"], correctIndex: 2, explanation: "山竹：因為榴槤在中醫裡屬「燥熱」，而山竹屬「清涼」，兩者一起吃被認為可以平衡身體的火氣。" },
                { question: "吃完榴槤後，手上的「榴槤味」很難洗掉，這時候利用榴槤殼的哪一個部位來洗手，可以神奇地把味道除掉？", options: ["用外面尖尖的刺來抓手", "將水倒進殼內側「白色凹槽」處，用裡面的水洗手", "把殼戴在頭上大喊「臭氣消失」", "把殼埋進土裡，把手伸進土裡搓一搓"], correctIndex: 1, explanation: "將水倒進殼內側凹槽洗手。榴槤殼內側白色的部分含有一種天然成分，可以像磁鐵一樣把臭味抓走。" },
                { question: "請問台灣檸檬的故鄉在哪裡？", options: ["恆春", "拉拉山", "高雄", "屏東"], correctIndex: 3, explanation: "屏東縣九如鄉：因為日照強烈、水質清澈與排水良好的砂質土壤，是全台灣檸檬產量最多的檸檬之鄉。" },
                { question: "為什麼「愛文芒果」的外皮是紅色的？", options: ["因為它害羞", "為了吸引小鳥", "因為曬過太陽", "因為噴了紅漆"], correctIndex: 2, explanation: "愛文芒果在樹上曬到太陽後，果皮會產生花青素變成漂亮的紅色。" },
                { question: "台灣水果王國的「夏季三寶」通常是指芒果、荔枝和什麼？", options: ["西瓜", "草莓", "橘子", "柿子"], correctIndex: 0, explanation: "芒果、荔枝、西瓜是台灣夏天最受歡迎的三大水果。" },
                { question: "哪一種台灣水果曾被稱為「聖女」，其實是番茄的一種？", options: ["大番茄", "聖女小番茄", "桃太郎番茄", "黑柿番茄"], correctIndex: 1, explanation: "聖女小番茄是台灣早年非常著名的品種，甜度高且口感好。" },
                { question: "為什麼文旦（柚子）採收後要「辭水」（放幾天再吃）？", options: ["為了讓它長大", "讓水分散失，果肉才會變軟、變甜", "為了讓皮變厚", "為了招財"], correctIndex: 1, explanation: "辭水後皮會變皺變黃，但果肉會縮小並集中甜味，變得更好吃。" },
                { question: "芭樂（番石榴）富含哪一種營養素，含量甚至比檸檬還多？", options: ["鈣質", "維生素 C", "蛋白質", "脂肪"], correctIndex: 1, explanation: "芭樂是水果界的維生素 C 之王，吃芭樂可以有效補充維生素C！" },
                { question: "下列哪一種水果是「長在樹幹上」的？", options: ["樹葡萄", "西瓜", "葡萄", "草莓"], correctIndex: 0, explanation: "樹葡萄（嘉寶果）的花和果實是直接長在樹幹和主枝上的，看起來密密麻麻的。" },
                { question: "龍眼和荔枝的差別是什麼？", options: ["龍眼皮黃褐色、荔枝皮紅色", "龍眼比較大", "荔枝有長毛", "沒差別"], correctIndex: 0, explanation: "這是外觀最直觀的區別。龍眼是黃褐色的平滑圓球，荔枝外殼則是偏紅色帶有粗糙顆粒。" },
                { question: "「東方美人」是一種茶，那「東方美人」也是哪種水果的別名？", options: ["桃子", "柿子", "梨子", "芒果"], correctIndex: 3, explanation: "愛文芒果因為顏色紅艷漂亮、香氣迷人，有時會被形容為水果界的東方美人。" },
                { question: "番茄在台灣既是水果也是蔬菜，哪一種番茄通常用來「煮湯」？", options: ["聖女小番茄", "玉女番茄", "牛番茄", "櫻桃番茄"], correctIndex: 2, explanation: "牛番茄（大番茄）纖維多、果肉厚，非常適合烹飪燉湯。" },
                { question: "蓮霧的「臍部」（底部）越開，代表這顆蓮霧：", options: ["越酸", "越甜", "越苦", "還沒熟"], correctIndex: 1, explanation: "底部的四片花萼完全展開且呈現深紅色，通常代表成熟度高，非常甜。" },
                { question: "什麼水果吃多可能會導致皮膚稍微「變黃」，但多喝水就會好？", options: ["柳丁", "西瓜", "木瓜", "葡萄"], correctIndex: 2, explanation: "木瓜富含胡蘿蔔素，吃過量會暫時累積在皮膚讓皮膚發黃，多喝水代謝掉就好。" },
                { question: "台灣被稱為「水果王國」，最重要的原因是什麼？", options: ["水果很便宜", "水果長得很大", "氣候好、農民技術高、種類超豐富", "大家都很愛吃"], correctIndex: 2, explanation: "台灣跨越熱帶與亞熱帶，加上超強的農業改良技術，才能一年四季都有各種好吃的優質水果。" },
                { question: "台灣水果的「產季」通常會因為什麼而改變？", options: ["老師的心情", "氣候與育種技術", "價格", "顏色"], correctIndex: 1, explanation: "農民透過燈照或接枝等農業技術，可以讓水果提前或延後產出。" },
                { question: "為什麼逛夜市被認為是台灣的文化瑰寶？", options: ["因為食物便宜又多樣", "充滿人情味與在地特色", "展現了台灣人的創意", "以上皆是"], correctIndex: 3, explanation: "夜市集結了台灣的飲食精華與生活縮影，結合了美食、玩樂與人情味！" },
            { question: "台灣很多老牌夜市都在「廟口」附近，這主要是因為什麼？", options: ["因為神明也想吃消夜", "因為廟裡比較涼快", "因為廟口是以前人潮聚集、聊天的地方", "因為廟裡可以借廚房"], correctIndex: 2, explanation: "以前的人生活重心都在寺廟，大家去拜拜、看戲或聚會，攤販看到哪裡人多就去哪裡擺攤，最後就形成了夜市。" },
            { question: "以前沒有發財車，攤販會用什麼工具載著食物到處走？", options: ["遙控汽車", "扁擔（用肩膀挑）", "直升機", "把桌子頂在頭上"], correctIndex: 1, explanation: "最早的攤販是「行動餐館」，用一根扁擔挑著爐灶、食材跟餐具，哪裡有慶典就走到哪裡賣。" },
            { question: "在沒有電燈的古代，夜市攤販用什麼東西來照亮攤位？", options: ["幾萬隻螢火蟲", "電石燈（會發出臭臭的味道）", "螢光棒", "讓大家摸黑吃東西"], correctIndex: 1, explanation: "早期使用電石燈，利用化學反應產生火光，因為味道不好聞，台語又叫它「臭燈仔」。" },
            { question: "台灣夜市為什麼大多在「晚上」營業？", options: ["因為白天大家要工作、讀書，晚上才有空出來逛街", "因為食物在晚上比較香", "因為晚上不會下雨", "因為晚上警察不抓違規"], correctIndex: 0, explanation: "夜市最初是為了體諒白天辛苦工作的工人跟農民，讓他們在晚上有個放鬆、吃東西的地方。" },
            { question: "台北著名的「士林夜市」最早是因為靠近哪裡，所以有很多生意人聚集？", options: ["飛機場", "基隆河的小碼頭", "動物園", "警察局"], correctIndex: 1, explanation: "以前士林慈諴宮附近有碼頭，農產品會從這裡進出，人來人往就帶動了夜市的發展。" },
            { question: "夜市裡常聽到的「叫賣聲」或是老闆「敲敲打打」的聲音，最早是為了什麼？", options: ["為了吵醒睡覺的人", "為了吸引客人的注意", "為了慶祝生日", "因為老闆心情不好"], correctIndex: 1, explanation: "在沒有大喇叭的年代，攤販會用獨特的口號或敲打聲來當作廣告，讓路人知道好吃的東西來了！" },
            { question: "為什麼有些夜市的小吃（例如擔仔麵）會讓客人「坐矮板凳」吃？", options: ["因為老闆比較矮", "因為矮板凳比較貴", "為了讓客人吃完趕快走", "延續以前路邊攤「挑扁擔、就地而坐」的傳統習慣"], correctIndex: 3, explanation: "這是一種懷舊的傳統，早期挑扁擔的攤位高度很低，大家就坐著矮凳吃，變成了台灣夜市的一種文化特色。" },
            { question: "台灣夜市現在變得世界聞名，主要是因為它具備什麼特點？", options: ["東西種類多、便宜又好吃", "可以在夜市玩遊戲", "展現了台灣人的熱情", "以上皆是"], correctIndex: 3, explanation: "夜市結合了美食、玩樂與人情味，這就是台灣夜市最大的魅力！" },
            { question: "傳說中發明臭豆腐的人是清朝的「王致和」，他為什麼會開始賣豆腐呢？", options: ["因為他覺得豆腐長得很漂亮", "因為他進京趕考沒考上，為了生活只好賣豆腐", "因為他想發明豆腐做的玩具", "因為他家門口剛好有一棵豆腐樹"], correctIndex: 1, explanation: "王致和落榜後路費不夠，決定一邊讀書一邊賣豆腐維生，沒想到卻因為醃製發酵的「臭豆腐」而出名！" },
            { question: "臭豆腐特殊的氣味是來自於什麼過程？", options: ["噴了臭臭粉", "壞掉腐爛", "發酵", "泡過醋水"], correctIndex: 2, explanation: "豆腐泡在由蔬菜、藥材等發酵製成的「臭滷水」中發酵而得。" },
            { question: "在台灣夜市，炸臭豆腐通常會搭配哪一種配菜來解膩？", options: ["薯條", "台式酸甜泡菜", "冰淇淋", "韓式泡菜"], correctIndex: 1, explanation: "台灣炸臭豆腐的經典拍檔就是用高麗菜醃製的「台式泡菜」，酸甜口感剛好能平衡油膩感。" },
            { question: "聽說清朝的「慈禧太后」也非常喜歡吃臭豆腐，她給了它一個優雅的名字叫什麼？", options: ["黑珍珠", "臭香香", "御青方", "豆腐王"], correctIndex: 2, explanation: "慈禧太后覺得好吃但名字不好聽，根據它青墨色的外觀，賜名為「御青方」。" },
            { question: "台灣最著名的「蚵仔煎」，據說最早是因為哪位將軍在缺糧時發明的？", options: ["鄭成功", "施琅", "孫悟空", "關羽"], correctIndex: 0, explanation: "傳說鄭成功與荷蘭作戰時缺糧，利用當地的牡蠣和番薯粉煎成餅吃。" },

            { question: "在夜市看老闆煎蚵仔煎時，除了蚵仔，通常還會加入哪一種「綠色蔬菜」增加口感？", options: ["小黃瓜", "苦瓜", "小白菜（或茼蒿）", "西蘭花"], correctIndex: 2, explanation: "為了營養均衡且口感更豐富，老闆會抓一把小白菜或是冬天限定的茼蒿一起煎。" },
            { question: "請問下面哪一項最常出現在「台南版」的蚵仔煎裡，但在北部卻很少見？", options: ["小黃瓜", "清脆的豆芽菜", "巧克力", "玉米粒"], correctIndex: 1, explanation: "清脆的豆芽菜是台南蚵仔煎的一大特色，吃起來會多了一種咔滋咔滋的口感！" },
            { question: "蚵仔煎上面的「紅色甜辣醬」非常重要，它的味道通常是什麼感覺？", options: ["只有苦味", "只有酸味", "酸酸甜甜、微辣", "鹹到要狂喝水"], correctIndex: 2, explanation: "每家店都有秘製醬汁，通常用味噌、番茄醬和糖調配，酸甜的味道能讓海鮮更鮮美。" },
            { question: "蚵仔煎裡面的主角「蚵仔」，它的本名其實叫什麼？", options: ["螃蟹", "牡蠣", "龍蝦", "海瓜子"], correctIndex: 1, explanation: "蚵仔是台語說法，正式名稱是「牡蠣」，因為營養價值非常高，也有「海中牛奶」的美稱！" },
            { question: "哪一種夜市飲品被稱為「台灣可樂」，是黑豆發酵或多種植物熬製的飲料？", options: ["仙草蜜", "綠豆湯", "薩士比亞", "仙草茶（或青草茶）"], correctIndex: 3, explanation: "青草茶含有多種本土植物，在早期是台灣人消暑的必備飲料。" },
            { question: "珍珠奶茶是在哪一個年代的台灣發明出來的？", options: ["明鄭時期", "1980 年代", "去年剛發明", "日治時期"], correctIndex: 1, explanation: "大約在 1980 年代，將傳統點心粉圓加入泡沫紅茶中而爆紅。" },
            { question: "關於誰才是「珍奶創始店」，台灣有兩間很有名的店都在爭第一，是哪兩間？", options: ["麥當勞和肯德基", "春水堂和翰林茶館", "50嵐和清心", "星巴克和路易莎"], correctIndex: 1, explanation: "台中的「春水堂」與台南的「翰林茶館」都自稱是珍奶發明者，兩間店還因此打過官司呢！" },
            { question: "剛發明時，珍珠奶茶裡面的珍珠（粉圓）其實有不同的顏色，最早出現的是什麼顏色？", options: ["只有黑色", "白色和黑色", "彩虹色", "透明色"], correctIndex: 1, explanation: "一開始有白珍珠和黑珍珠，後來加入黑糖熬煮的黑粉圓因為看起來像「黑珍珠」，更受大家歡迎。" },
            { question: "「珍珠奶茶」裡的珍珠（粉圓），主要是由哪種植物的粉做成的？", options: ["麵粉", "樹薯粉", "玉米粉", "太白粉"], correctIndex: 1, explanation: "樹薯粉具有很強的韌性與彈性，這就是粉圓 Q 彈口感的來源。" },
            { question: "珍珠奶茶為什麼要叫做「珍珠」，而不是「粉圓」奶茶？", options: ["裡面真的放了珠寶", "為了聽起來很華麗、好聽", "因為珍珠可以美白", "因為珍珠是外星人名字"], correctIndex: 1, explanation: "粉圓本來是傳統甜點，為了讓它聽起來更高貴、吸引客人，才改名叫「珍珠」，結果在全球大爆紅！" },
            { question: "「大腸包小腸」外面的那層「大腸」其實是什麼做的？", options: ["塑膠袋", "糯米跟豬大腸衣", "麵粉", "豆腐皮"], correctIndex: 1, explanation: "是將糯米灌入洗淨的豬大腸衣中蒸熟，再夾入香腸。" },
            { question: "大腸包小腸在夜市有個很酷的綽號，被稱為什麼？", options: ["台灣熱狗", "台灣漢堡", "台灣披薩", "台灣壽司"], correctIndex: 1, explanation: "因為它是用糯米腸切開夾住香腸，就像漢堡用麵包夾住肉片一樣，所以被稱為「台式漢堡」。" },
            { question: "「大腸包小腸」最早據說是在台灣哪一個縣市發明，後來才傳遍全台灣的？", options: ["台北市", "高雄市", "花蓮縣和台中一帶", "宜蘭縣"], correctIndex: 2, explanation: "普遍說法是在 1990 年代左右，在花蓮與台中的夜市開始流行這種吃法，迅速爆紅。" },
            { question: "炭烤大腸包小腸時，老闆通常會在中間夾入哪一種「辛辣」的蔬菜來提味？", options: ["辣椒", "生大蒜（或蒜片）", "苦瓜", "洋蔥"], correctIndex: 1, explanation: "台灣人吃香腸最經典的配備就是「生大蒜」，辛辣的感覺跟甜甜的香腸非常搭！" },
            { question: "為了讓口感更豐富，除了香腸和糯米腸，中間還會加入哪種脆脆的配菜？", options: ["薯條", "酸菜與小黃瓜", "爆米花", "軟糖"], correctIndex: 1, explanation: "酸菜的鹹香和小黃瓜的清爽，可以完美平衡香腸的油膩感。" },
            { question: "為什麼大腸包小腸通常是用「紙袋捲起來」裝，而不是用盤子裝？", options: ["為了環保", "為了可以一邊逛街一邊旋轉紙袋推出來吃", "因為盤子太重了", "為了保暖"], correctIndex: 1, explanation: "透過旋轉紙袋底部，就能像吃護唇膏一樣把食物推出來，完全不會沾到手，非常適合逛夜市。" },
            { question: "為什麼夜市常見到「烤玉米」，卻很少看到「煮玉米」？", options: ["因為烤的比較快", "烤玉米塗的醬料更有特色", "煮的會爆炸", "沒人會煮"], correctIndex: 1, explanation: "台灣烤玉米的靈魂在於各家秘製的沙茶、花生醬或中藥醬汁，烤起來香氣四溢。" },
            { question: "「大雞排」通常會強調「比臉大」，這是哪裡的知名特色？", options: ["日本", "台灣夜市", "美國", "韓國"], correctIndex: 1, explanation: "大雞排是台灣 1990 年代後發展出的代表性庶民美食。" },
            { question: "雞排為什麼要做成「扁扁大大的」形狀，而不像麥當勞做成炸雞塊？", options: ["看起來比臉還大，吸引客人", "為了讓它飛得比較遠", "為了節省袋子的空間", "因為雞長得扁扁的"], correctIndex: 0, explanation: "將雞肉攤平受熱面積變大，炸起來速度快，且視覺上非常震撼，讓客人覺得超划算！" },
            { question: "在夜市買雞排時，為什麼專業的吃貨通常建議「不切」？", options: ["怕切了會少一塊", "為了保護環境", "為了鎖住肉汁，讓雞排不會乾乾的", "因為老闆沒力氣切"], correctIndex: 2, explanation: "切開後肉汁會流失到袋子裡，肉質就會變硬、變乾，所以整塊咬才是最美味的吃法！" },
            { question: "除了傳統的「酥脆炸雞排」，後來台灣還流行一種先炸過再抹醬去烤的吃法叫？", options: ["冰凍雞排", "碳烤雞排", "雞排火鍋", "甜點雞排"], correctIndex: 1, explanation: "結合了炸雞的酥脆與炭火的香氣，抹上甜鹹的烤肉醬，是非常受歡迎的進階吃法。" },
            { question: "台灣雞排的靈魂調味料，除了胡椒粉之外，最常見的是哪一種口味？", options: ["巧克力粉", "辣粉", "抹茶粉", "糖霜"], correctIndex: 1, explanation: "辣椒粉是雞排的最佳拍檔！通常可以選擇不辣到大辣，滿足各種口味。" },
            { question: "台灣「平價牛排」大約是在什麼時候開始在夜市流行起來的？", options: ["200 年前", "1970 年代（大約 50 年前）", "去年剛發明", "未來世界"], correctIndex: 1, explanation: "1970 年代孫東寶先生在路邊擺攤，發明了這種讓普通老百姓也吃得起的牛排。" },
            { question: "夜市牛排最經典的特色，就是會放在一個燙燙的什麼上面？", options: ["塑膠盤", "冰塊", "鐵板", "木頭盒子"], correctIndex: 2, explanation: "使用加熱過的鐵板可以保持牛排的溫度，還會讓醬汁噴發出超誘人的香氣！" },
            { question: "當服務生把牛排端上桌時，為什麼大家都要趕快拿「餐巾紙」擋在面前？", options: ["怕被鄰居看到吃肉", "為了擋住噴濺的油和醬汁", "為了玩躲貓貓", "因為紙巾很香"], correctIndex: 1, explanation: "醬汁淋在滾燙鐵板上會劇烈噴濺，拿紙巾擋著才不會弄髒衣服或被燙到喔！" },
            { question: "台灣夜市牛排通常是一整套的，盤子裡一定還會出現哪一種配餐？", options: ["漢堡麵包", "鐵板麵", "握壽司", "爆米花"], correctIndex: 1, explanation: "這是台灣特色！盤子裡通常會放烏龍麵或油麵，吸滿濃郁的醬汁吃完超飽足。" },
            { question: "在牛排旁邊通常還會有一顆雞蛋，要怎麼吃才是「夜市老饕」的最愛？", options: ["趁鐵板還很燙時趕快翻面煎熟", "拿去丟老闆", "放進口袋帶回家", "用吸管吸"], correctIndex: 0, explanation: "利用鐵板的餘溫把蛋煎成自己喜歡的半熟或全熟，是逛夜市的小樂趣！" },
            { question: "夜市牛排的兩種經典醬汁，除了「蘑菇醬」之外，另一種辣辣的是什麼醬？", options: ["巧克力醬", "草莓醬", "黑胡椒醬", "煉乳"], correctIndex: 2, explanation: "黑胡椒醬帶點微辣和強烈的香氣，是大人最喜歡的口味。" },
            { question: "當你點完夜市牛排餐後，老闆通常會送上一碗什麼湯讓你喝到飽？", options: ["魚湯", "濃縮咖啡", "玉米濃湯", "味噌湯"], correctIndex: 2, explanation: "甜甜香香的台式玉米濃湯是台灣平價牛排的最佳拍檔。" },
            { question: "很多夜市牛排店還會附贈一種「裡面有包奶油」的小麵包，它叫什麼？", options: ["巨無霸漢堡", "餐包", "法國麵包", "甜甜圈"], correctIndex: 1, explanation: "烤得熱熱的小餐包，咬開後裡面有融化的鹹甜奶油，是小朋友的最愛。" },
            { question: "為什麼夜市牛排的肉吃起來通常感覺特別「軟嫩」？", options: ["因為牛肉有運動", "因為有用醃料或嫩精先處理過", "因為那是棉花糖做的", "因為牛肉有泡溫泉"], correctIndex: 1, explanation: "為了讓口感一致且好咬，老闆通常會先用獨門醬汁和嫩化技術處理。" },
            { question: "台灣夜市常見的「加熱滷味」，據說最早是從哪一種店家的「免費配菜」變來的？", options: ["麵攤", "麵包店", "咖啡廳", "書店"], correctIndex: 0, explanation: "早期的麵攤會準備滷汁滷豆乾海帶當配菜，後來太受歡迎才獨立變成滷味攤。" },
            { question: "「加熱滷味」和「冷滷味」最大的差別是什麼？", options: ["一個要排隊，一個不用", "一個是熱的，一個是涼的", "一個有肉，一個沒肉", "一個甜的，一個辣的"], correctIndex: 1, explanation: "冷滷味是滷好放涼吃，口感較Q；加熱滷味則是選好後老闆丟進滾燙滷汁現燙。" },
            { question: "滷味攤上有一種黑黑長長的，被稱為「台灣巧克力」的食材是什麼？", options: ["豬血糕", "鐵蛋", "巧克力條", "海帶"], correctIndex: 0, explanation: "豬血糕是用豬血和糯米做成的，因為形狀長得像長條巧克力，被老外這樣幽默稱呼。" },
            { question: "為什麼滷味裡面的「王子麵」或「科學麵」通常要最後才放進去？", options: ["因為它最貴", "因為它很怕熱", "為了保持麵條 Q 彈，避免煮得太爛", "因為老闆會忘了放"], correctIndex: 2, explanation: "泡麵吸水很快，如果煮太久會變得軟爛不好吃，所以老闆通常最後才燙一下。" },
            { question: "哪一種食材被稱為「滷味界的小海綿」，因為它能吸滿滿的滷汁湯頭？", options: ["貢丸", "豆皮（或花干）", "魚板", "玉米筍"], correctIndex: 1, explanation: "豆皮和花干中間有很多小孔洞，吸飽滷汁後咬下去會「爆漿」，是很多人的最愛。" },
            { question: "在滷味攤選菜時，老闆通常會給你一個什麼東西來裝你想吃的菜？", options: ["書包", "塑膠籃子和夾子", "臉盆", "大鍋子"], correctIndex: 1, explanation: "選好想吃的東西放進籃子，夾上帶有號碼的夾子，老闆就知道是哪位客人的囉！" },
            { question: "滷味好吃的靈魂配角，除了酸菜之外，還有哪一種「綠色植物」常被切碎灑在上面？", options: ["聖誕樹", "蔥花或香菜", "仙人掌", "玫瑰花"], correctIndex: 1, explanation: "新鮮的蔥花與香菜能增加香氣，讓滷味吃起來更加清爽。" },
            { question: "「冷滷味」中最有名的小點心「鐵蛋」，它的外皮為什麼會又黑又硬？", options: ["因為噴了黑漆", "因為經過反覆的滷製與風乾", "因為放太久變成了石頭", "因為它是黑雞生的"], correctIndex: 1, explanation: "鐵蛋是滷好後風乾，再滷、再風乾，重複很多次，體積會縮小且口感變得很有嚼勁。" },
            { question: "「章魚燒」最早是由哪一個國家發明，後來才傳入台灣變成受歡迎的小吃？", options: ["美國", "泰國", "日本", "韓國"], correctIndex: 2, explanation: "章魚燒起源於日本大阪，大約在 1990 年代開始在台灣夜市流行起來。" }
        ],
            // 第二週：夜市小吃後半段 ＋ 飲品零食 ＋ 地名美食 (共104題)
        1: [
            { question: "剛做好的章魚燒上面，會灑上一種薄薄的片狀物，遇熱還會跳舞，那是什麽？", options: ["枯樹葉", "巧克力片", "柴魚片", "碎紙片"], correctIndex: 2, explanation: "那是「柴魚片」，因為切得非常薄，受到熱氣對流影響會不斷晃動，就像在跳舞一樣。" },
            { question: "在台灣夜市看老闆做章魚燒時，那一顆顆圓滾滾的球，主要是用什麼做的？", options: ["泥土", "麵粉糊（麵漿）", "糯米粉", "雞蛋黃"], correctIndex: 1, explanation: "老闆會將麵粉糊倒入圓形凹槽的鐵板，放入章魚和配料，慢慢翻轉成圓球。" },
            { question: "製作「章魚燒」時，店員會用什麼工具快速翻動圓球？", options: ["筷子", "叉子", "鋼鐵針", "湯匙"], correctIndex: 2, explanation: "使用長長的鋼針翻動，是保持圓球完美形狀的關鍵技術！" },
            { question: "為什麼「甜不辣」的名字聽起來很奇怪？它是音譯自哪國語言？", options: ["英語", "西班牙語", "葡萄牙語/日語", "德語"], correctIndex: 2, explanation: "源自葡萄牙語 Tempura，傳教士帶到日本後，再由日語傳入台灣變成了「甜不辣」。" },
            { question: "「鼎邊趖」的「趖」字是什麼意思？", options: ["很好吃", "游動、爬行的樣子", "快速剪斷", "煮熟"], correctIndex: 1, explanation: "是指米漿沿著熱鍋邊緣滑下去結成薄片的動作，看起來就像在爬行游動。" },
            { question: "滷味攤或烤肉攤常見的「米血」，主要是由哪兩種食材組合而成的？", options: ["巧克力和棉花糖", "豬血和糯米", "黑芝麻和白飯", "墨魚汁和麵粉"], correctIndex: 1, explanation: "早期農村社會節儉，殺豬後會把豬血留下來，加入糯米蒸熟，變成了好吃的豬血糕。" },
            { question: "在夜市買沾粉豬血糕時，老闆最後一定會把它放進一個充滿什麼粉的盒子裡滾一滾？", options: ["奶粉", "辣椒粉", "花生粉", "麵粉"], correctIndex: 2, explanation: "熱騰騰的豬血糕沾上甜香的「花生粉」加香菜，是台灣夜市最經典的吃法！" },
            { question: "為什麼「米血」吃起來會比一般的白飯還要 Q 彈、有嚼勁呢？", options: ["因為加了橡皮筋", "因為使用了糯米，蒸煮後澱粉很有彈性", "用機器壓扁的", "在太陽下曬過"], correctIndex: 1, explanation: "米血使用的是「糯米」，糯米的特性就是黏性強，所以吃起來特別有嚼勁。" },
            { question: "麵線糊裡面的麵線，顏色為什麼看起來是「紅褐色」的？", options: ["加了巧克力染色", "經過長時間烘烤和蒸煮產生焦糖色", "在土裡長大", "加了紅蘿蔔汁"], correctIndex: 1, explanation: "紅麵線是經過高溫烘烤，澱粉產生變化所以顏色較深，而且比白麵線更耐煮不爛。" },
            { question: "為什麼麵線糊的湯汁喝起來「稠稠的」，不會像白開水一樣？", options: ["裡面加了膠水", "使用了「勾芡」技術", "煮太久麵線融化了", "加了太多糖"], correctIndex: 1, explanation: "這叫「勾芡」（加入太白粉水），可以讓湯汁緊緊包裹住麵線和配料，口感更滑順。" },
            { question: "在夜市買麵線糊時，最常看到的經典配料是哪兩種？", options: ["蚵仔和大腸", "蘋果和香蕉", "巧克力和棉花糖", "雞塊和薯條"], correctIndex: 0, explanation: "蚵仔鮮甜，大腸 Q 彈，是絕配！所以大家都叫它蚵仔大腸麵線。" },
            { question: "麵線糊好吃的靈魂配角，通常會加入哪一種「綠色葉子」來增加香氣？", options: ["楓葉", "荷葉", "香菜", "聖誕樹葉"], correctIndex: 2, explanation: "香菜獨特的氣味能讓整碗麵線糊更有層次感！" },
            { question: "為了讓麵線糊更好吃，桌上通常會放哪一種「黑色透明」的調味料讓客人自己加？", options: ["墨魚汁", "烏醋", "黑咖啡", "醬油"], correctIndex: 1, explanation: "烏醋酸酸的味道可以去油解膩，還能完美帶出海鮮的鮮甜味。" },
            { question: "很多厲害的麵線糊老店，會加入一種「白白、辛辣」的泥狀物來提味，那是什麽？", options: ["香草冰淇淋", "蒜泥", "奶油", "鹽巴"], correctIndex: 1, explanation: "蒜泥能增加辛辣感和香氣，讓整碗麵線的味道變得超級香濃。" },
            { question: "鹿港有一種很特別的麵線糊吃法，他們會在裡面加入什麼「炸得酥脆」的東西？", options: ["炸蝦", "肉羹（或赤肉條）", "炸雞排", "薯片"], correctIndex: 1, explanation: "彰化鹿港的特色是會放肉羹，讓口感多了一種肉的咬勁，非常受歡迎。" },
            { question: "早期台灣農村社會，麵線糊最初是為了給誰吃的方便點心？", options: ["給國王吃的", "給在田裡辛苦工作的農民吃的", "給外星人的", "給貓咪的"], correctIndex: 1, explanation: "早期農忙時，主人會煮一鍋方便吞嚥的麵線糊送到田邊，讓農民快速補充體力。" },
            { question: "「愛玉冰」的愛玉是怎麼做出來的？", options: ["工廠合成", "在水中搓洗愛玉子", "樹上滴下來的膠", "雞蛋煮熟"], correctIndex: 1, explanation: "愛玉是全世界只有台灣才有的植物，將種子在水中搓揉就會釋放果膠凝結成凍。" },
            { question: "傳說中「愛玉」這個名字的由來，是因為什麼？", options: ["從愛玉村發現的", "是發明人女兒的名字", "吃起來有愛心的感覺", "長得像玉石"], correctIndex: 1, explanation: "相傳清朝商人發現這種果實，讓女兒「愛玉」搓洗成凍來賣，大受歡迎，就用女兒名字命名了。" },
            { question: "為什麼我們在搓愛玉時，一定要用自來水或礦泉水，不能用「純淨水」？", options: ["愛玉喜歡髒水", "需要水裡的礦物質（鈣離子）幫忙結凍", "純淨水太貴", "純淨水會讓它變臭"], correctIndex: 1, explanation: "愛玉果膠需要和水裡的鈣、鎂離子結合才能凝固，純淨水太乾淨缺乏礦物質，愛玉就結不起來喔！" },
            { question: "在夜市吃愛玉冰時，最經典的組合是加入哪一種水果的汁，喝起來酸甜清爽？", options: ["西瓜", "榴槤", "檸檬", "草莓"], correctIndex: 2, explanation: "檸檬的酸香與愛玉的滑嫩是絕配！「檸檬愛玉」是台灣夏季最受歡迎的消暑聖品。" },
            { question: "甜不辣的主要材料是什麼？為什麼吃起來有鮮甜的味道？", options: ["麵粉和糖", "魚漿（把魚肉磨成泥）", "豬肉片", "雞蛋"], correctIndex: 1, explanation: "它是用新鮮魚肉磨成泥，加入澱粉和調味料混合後，再捏成形狀拿去炸或煮。" },
            { question: "在夜市買「甜不辣」時，老闆通常會把食材放在哪裡煮？", options: ["放在牛排裡一起煮", "放在一鍋熱騰騰的「高湯」裡慢煮", "放在烤爐上烤", "用微波爐加熱"], correctIndex: 1, explanation: "夜市常見的甜不辣是放在大鍋湯裡煮，裡面還會放蘿蔔、豬血糕、貢丸等好夥伴。" },
            { question: "甜不辣碗裡通常會有一種「圓圓白白」的蔬菜，那是什麽？", options: ["梨子", "白蘿蔔", "馬鈴薯", "蘋果"], correctIndex: 1, explanation: "白蘿蔔是甜不辣湯頭好喝的秘密，它吸滿了魚漿的鮮味，吃起來又軟又甜。" },
            { question: "甜不辣吃完後，有一個台灣特有的「免費傳統」，一定要做這件事才算完美結尾！", options: ["跟老闆親一下", "把碗帶回家", "拿碗去裝「免費的高湯」來喝", "在碗底寫名字"], correctIndex: 2, explanation: "碗底剩下的醬汁加進老闆的大骨高湯一起喝，是老饕最愛的終極吃法！" },
            { question: "台灣另一種也叫「天婦羅」的小吃（如基隆廟口），它跟甜不辣最大的差別是：", options: ["一個甜一個辣", "一個是湯煮，一個是現炸出來的", "一個有魚一個沒魚", "一個比較貴"], correctIndex: 1, explanation: "基隆的天婦羅通常是現捏現炸，吃起來外皮酥酥的；而甜不辣多是指在湯裡煮的。" },
            { question: "刈包外皮白白軟軟的，它是用什麼方式做出來的？", options: ["用烤箱烤", "用油炸", "用大火「蒸」熟", "用微波爐"], correctIndex: 2, explanation: "刈包皮和饅頭一樣，都是用麵粉發酵後蒸熟的，所以口感才這麼軟綿。" },
            { question: "刈包有一個超酷的綽號叫「虎咬豬」，這是為什麼？", options: ["老虎愛吃豬肉", "白色外皮張開像虎口，夾住紅燒豬肉", "老闆屬虎", "老虎發明的"], correctIndex: 1, explanation: "半圓形的麵皮張開時就像老虎的大嘴，夾住大塊豬肉的樣子非常生動！" },
            { question: "在傳統習俗中，哪一天一定要吃刈包，象徵「財源滾滾」？", options: ["端午節", "中秋節", "尾牙（農曆12月16日）", "聖誕節"], correctIndex: 2, explanation: "因為刈包長得像裝滿錢的「錢包」，尾牙吃刈包代表把錢財裝滿滿，明年發大財！" },
            { question: "刈包裡最常見的主角是什麼肉？", options: ["牛排", "雞排", "滷豬五花肉", "鴨排"], correctIndex: 2, explanation: "傳統口味是滷到軟嫩的五花肉，有肥有瘦最好吃。" },
            { question: "為了中和肉的鹹味，刈包裡一定會灑上一種甜甜的粉，那是什麽？", options: ["巧克力粉", "花生粉", "抹茶粉", "奶粉"], correctIndex: 1, explanation: "花生粉（通常會加糖）是刈包的靈魂，能增加香氣並讓味道更平衡。" },
            { question: "刈包裡綠綠的、酸酸脆脆的配菜是什麼？", options: ["小黃瓜", "青椒", "酸菜", "絲瓜"], correctIndex: 2, explanation: "酸菜可以解掉豬肉的油膩感，讓刈包吃起來更清爽。" },
            { question: "刈包因為像錢包，傳統上吃刈包還有代表什麼大吉大利的意思？", options: ["把今年不好的事情通通咬碎吃掉", "吃了會變聰明", "吃了會長高", "代表想睡覺"], correctIndex: 0, explanation: "古人認為吃刈包可以象徵把過去一年不順心、倒楣的事通通「咬碎吃掉」，明年會有好運。" },
            { question: "刈包裡除了花生粉，還常會放哪一種「香味很重」的綠色葉子？", options: ["九層塔", "香菜", "楓葉", "玫瑰花"], correctIndex: 1, explanation: "香菜是台灣小吃的經典配角，能提升整體的香氣層次。" },
            { question: "刈包的外皮通常是什麼形狀？", options: ["三角形", "長方形", "半圓形的長方片", "五角星形"], correctIndex: 2, explanation: "它是長方形的麵皮對折，變成半開口的半圓形。" },
            { question: "刈包現在被世界公認為「台灣漢堡」，這主要是因為？", options: ["它是用漢堡皮做的", "兩片麵餅夾肉，構造跟西洋漢堡很像", "麥當勞有賣", "美國人發明的"], correctIndex: 1, explanation: "因為構造和漢堡很像，外國朋友覺得這種吃法很親切，所以給它這個可愛的封號。" },
            { question: "地瓜球起源於台灣的農村，最早是因為什麼原因才發明這種點心的？", options: ["地瓜太多吃不完，想換種方式吃", "當作小鳥的食物", "拿來玩丟球遊戲", "慶祝新年"], correctIndex: 0, explanation: "以前台灣農村地瓜產量大，大家動腦筋把地瓜磨泥加上粉，做成可以當零食的小點心。" },
            { question: "剛炸好的地瓜球，為什麼放久了會「縮小」變醜？", options: ["它想睡覺", "裡面的熱空氣跑掉，外皮冷掉變硬就縮起來了", "被蟲吃了", "在變魔術"], correctIndex: 1, explanation: "地瓜球好吃的關鍵在「趁熱吃」，空氣冷卻收縮後，原本撐開的皮就會塌下去變硬！" },
            { question: "地瓜球在油炸的過程中，老闆會一直用漏勺「用力壓」它們，這是為了什麼？", options: ["老闆心情不好", "把地瓜擠出來", "讓空氣進入，使地瓜球變得大顆又中空 Q 彈", "壓成餅乾"], correctIndex: 2, explanation: "透過「熱漲冷縮」原理，反覆按壓能讓空氣跑進球心，變成外酥內空的 Q 彈大圓球。" },
            { question: "地瓜球吃起來ＱＱ的，除了地瓜泥，裡面還加了哪一種神奇的粉？", options: ["泡打粉", "巧克力粉", "樹薯粉（或地瓜粉）", "洗衣粉"], correctIndex: 2, explanation: "樹薯粉具有很強的彈性，跟地瓜泥混合後，就是地瓜球吃起來有嚼勁的原因。" },
            { question: "在夜市除了常見的黃色地瓜球，還有一種「紫色」的地瓜球，那是加了什麼？", options: ["紫色藥水", "紫地瓜（芋頭地瓜）", "葡萄汁", "藍莓醬"], correctIndex: 1, explanation: "黃地瓜比較甜，紫地瓜則含有花青素，顏色漂亮又有營養。" },
            { question: "台灣夜市常見的「小火鍋」，為什麼要叫「小」火鍋呢？", options: ["給小朋友吃的", "因為是「一人一鍋」，分量剛好一個人", "鍋子是玩具", "菜切很小"], correctIndex: 1, explanation: "發明這種「個人鍋」，讓一個人逛夜市也能享受吃火鍋的樂趣，方便又便宜。" },
            { question: "早期夜市小火鍋桌上會放一個小架子點火，最常見的加熱燃料是什麼？", options: ["瓦斯爐", "酒精膏", "打火機", "木炭"], correctIndex: 1, explanation: "早期為了方便路邊擺攤，會使用藍色的「酒精膏」點火，是夜市經典的回憶。" },
            { question: "哪一種口味是台灣夜市火鍋的「人氣王」，裡面通常會放酸酸的白菜？", options: ["咖哩鍋", "酸菜白肉鍋", "奶昔鍋", "沙茶鍋"], correctIndex: 1, explanation: "酸菜白肉鍋或是大腸臭臭鍋是夜市火鍋的經典口味，酸鹹開胃！" },
            { question: "為什麼很多夜市火鍋店會標榜「白飯、飲料、冰淇淋無限供應」？", options: ["老闆賺大錢", "讓學生、上班族花小錢就「吃得超飽」", "東西快過期了", "慶祝老闆生日"], correctIndex: 1, explanation: "這是平價火鍋的特色。透過「自助吧吃到飽」，變成超高 CP 值的晚餐選擇。" },
            { question: "台灣有一種有名的個人火鍋叫「臭臭鍋」，是因為裡面加了哪種食材？", options: ["臭雞蛋", "臭豆腐", "沒洗的襪子", "榴槤"], correctIndex: 1, explanation: "將臭豆腐、大腸、豬肉煮成一鍋，雖然聞起來有特殊味道但吃起來超香！" },
            { question: "台灣人最引以為傲的「平民美食」代表是什麼？", options: ["滷肉飯", "龍蝦", "牛排", "義大利麵"], correctIndex: 0, explanation: "滷肉飯是台灣最具代表性的庶民美食，便宜又好吃，南北都有不同風味。" },
            { question: "經典零食「乖乖」有個傳說，在電腦上放什麼顏色的乖乖能保佑機器不當機？", options: ["黃色", "紅色", "綠色", "紫色"], correctIndex: 2, explanation: "綠色代表「綠燈通行」，象徵機器運作正常。這是台灣工程師特有的傳統喔！" },
            { question: "為什麼「科學麵」包裝上有一位老爺爺？他是模仿哪位科學家？", options: ["牛頓", "愛因斯坦", "諾貝爾", "富蘭克林"], correctIndex: 1, explanation: "靈感來自物理學家「愛因斯坦」。早期它還跟動畫《科學小飛俠》合作過，所以叫科學麵。" },
            { question: "「彈珠汽水」裡面的玻璃彈珠，原本發明出來的功能是什麼？", options: ["拿來跟朋友比賽", "裝飾瓶子", "當作瓶蓋封住氣體", "攪拌汽水"], correctIndex: 2, explanation: "早期沒有金屬蓋，是利用汽水產生的氣壓將彈珠往上推，塞住瓶口防止漏氣。" },
            { question: "吃「跳跳糖」時嘴巴會砰砰跳，是因為糖果裡包裹了什麼氣體？", options: ["氧氣", "氮氣", "二氧化碳", "氫氣"], correctIndex: 2, explanation: "糖果製作時加入了高壓二氧化碳，當糖果在嘴裡融化，氣體噴出就會產生跳動感！" },
            { question: "「模範生點心麵」最早的由來，是利用製作什麼剩下的碎料做成的？", options: ["麵包", "餅乾", "泡麵", "蛋糕"], correctIndex: 2, explanation: "工廠將製作泡麵時掉下來的碎麵收集起來，調味後發現非常好吃，就變成了熱賣零食。" },
            { question: "為什麼古早味「雞蛋糕」通常要做成雞蛋的形狀？", options: ["證明它是蛋做的", "早期雞蛋珍貴，看起來比較營養高級", "隨機選的", "比較好拿"], correctIndex: 1, explanation: "以前物資缺乏雞蛋是奢侈品，做成蛋形可以讓小朋友視覺上覺得吃到了營養的蛋。" },
            { question: "「養樂多」的瓶子為什麼通常都很小，不出一公升的大瓶裝？", options: ["瓶子太貴", "怕喝太飽", "確保一次喝完維持菌種新鮮", "為了省水"], correctIndex: 2, explanation: "乳酸菌怕熱且怕雜菌污染，小包裝能確保新鮮度，讓你在好菌最活潑的時候一次喝掉。" },
            { question: "餅乾「真魷味」的外觀形狀，是模仿哪一種食物捲起來的樣子？", options: ["豬耳朵", "烤魷魚", "雞捲", "甜甜圈"], correctIndex: 1, explanation: "它的格紋與捲曲形狀，正是模仿碳烤魷魚片遇熱縮起來的模樣喔！" },
            { question: "「麵茶」這種傳統點心，最主要的材料是什麼？", options: ["麵條粉碎", "炒熟的麵粉", "茶葉粉末", "豆乾粉"], correctIndex: 1, explanation: "它是用微火將麵粉炒熟，加入糖和芝麻，沖入熱水後會變成香濃的糊狀點心。" },

            { question: "哪一種傳統糖果是用「麥芽糖」夾著一顆鹹鹹的小東西？", options: ["軟糖", "麥芽糖夾心酸梅", "巧克力", "苦瓜乾"], correctIndex: 1, explanation: "甜甜的麥芽糖包著鹹酸的梅子，這是台灣最經典的鹹甜組合古早味糖果！" },
            { question: "「鱈魚香絲」的主要材料除了魚漿，還會加入哪種粉增加嚼勁？", options: ["巧克力粉", "澱粉", "奶粉", "泡打粉"], correctIndex: 1, explanation: "加入澱粉能讓魚漿變得更有韌性，這樣才能拉成長條狀而且越嚼越香。" },

            { question: "喝完氣泡飲料會打嗝，是因為裡面含有哪種氣體？", options: ["氧氣", "二氧化碳", "氮氣", "氫氣"], correctIndex: 1, explanation: "二氧化碳在胃裡受熱體積變大，無處可去就會透過打嗝從嘴巴排出來。" },

            { question: "「旺旺仙貝」表面的白色粉末，吃起來是什麼味道？", options: ["甜甜鹹鹹", "只有苦味", "辣辣的", "酸酸的"], correctIndex: 0, explanation: "那是特調的甜鹹醬油調味粉，是仙貝好吃的關鍵靈魂！" },
            { question: "為什麼有些飲品（如維他命飲料）要用「棕色」瓶子裝？", options: ["比較好看", "遮光保護營養不被破壞", "玻璃只有這種顏色", "比較便宜"], correctIndex: 1, explanation: "棕色瓶能過濾掉部分光線，防止維生素C等營養成分因為被光線照射而分解失效。" },
            { question: "傳統零食「麻荖」外面包裹的白色一條一條的是什麼？", options: ["麵條", "米果/米粒", "碎紙", "巧克力"], correctIndex: 1, explanation: "那是用米膨發後做成的米果，沾上麥芽糖吃起來酥酥脆脆不黏牙。" },
            { question: "哪一種飲品被稱為「台灣可樂」，是利用多種植物根部精油製成的？", options: ["仙草茶", "冬瓜茶", "沙士", "麥茶"], correctIndex: 2, explanation: "沙士特有的味道來自植物精油，因為充滿氣泡且顏色深，被暱稱為台灣可樂。" },

        // 打亂陣列工具 (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

            const explanationText = document.getElementById('explanation-text');
            const btnNextWrong = document.getElementById('btn-next-wrong');
            const chanceFateContainer = document.getElementById('chance-fate-container');

            explanationText.innerText = qData.explanation;

            // 重新觸發動畫
            overlay.classList.remove('animate-pop');
            void overlay.offsetWidth; // trigger reflow
            overlay.classList.add('animate-pop');
            overlay.classList.remove('hidden-screen');

            if(isCorrect) {
                resultIcon.innerText = "⭕";
                resultTitle.innerText = "太棒了！答對啦！";
                resultTitle.className = "text-3xl md:text-5xl font-black mb-4 md:mb-8 text-green-500";
                
                btnNextWrong.classList.add('hidden-screen');
                chanceFateContainer.classList.remove('hidden-screen');
            } else {
                resultIcon.innerText = "❌";
                resultTitle.innerText = "哎呀！答錯了！";
                resultTitle.className = "text-3xl md:text-5xl font-black mb-4 md:mb-8 text-red-500";
                
                btnNextWrong.classList.remove('hidden-screen');
                chanceFateContainer.classList.add('hidden-screen');
            }
        }

        // 抽卡 (機會或命運)
        function drawCard(type) {
            // 如果卡片抽完了，重新補充並打亂 (避免當機)
            if(availableCards.length === 0) {
                availableCards = JSON.parse(JSON.stringify(initialCardsPool));
                shuffleArray(availableCards);
            }

            // 抽出一張卡 (從陣列尾部拿)
            const card = availableCards.pop();

            // 準備卡片畫面
            const cardScreen = document.getElementById('screen-card-result');
            document.getElementById('card-type-title').innerText = type + "卡";
            document.getElementById('card-desc').innerText = card.text;
            
            // 設定分數顯示顏色與文字
            const scoreDisplay = document.getElementById('card-score');
            if(card.score > 0) {
                scoreDisplay.innerText = "+" + card.score + " 分";
                scoreDisplay.className = "text-3xl md:text-5xl font-black mt-4 md:mt-6 text-green-500";
            } else if (card.score < 0) {
                scoreDisplay.innerText = card.score + " 分";
                scoreDisplay.className = "text-3xl md:text-5xl font-black mt-4 md:mt-6 text-red-500";
            } else {
                scoreDisplay.innerText = "0 分";
                scoreDisplay.className = "text-3xl md:text-5xl font-black mt-4 md:mt-6 text-gray-500";
            }

            cardScreen.classList.remove('hidden-screen');
        }

        // 進入下一題或結算
        function nextQuestion() {
            currentQuestionIndex++;
            
            if(currentQuestionIndex < currentQuestionList.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        // 遊戲結束結算
        function endGame() {
            document.getElementById('screen-card-result').classList.add('hidden-screen');
            showScreen('screen-end');
        }

        // 回主選單
        function backToMenu() {
            showScreen('screen-select');
        }

    </script>
</body>
</html>
